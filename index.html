<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>AI 助理 · AI Lab Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg0:#020617;
      --bg1:#0b1220;
      --panel: rgba(15, 23, 42, 0.72);
      --panel2: rgba(2, 6, 23, 0.55);
      --border: rgba(148,163,184,0.28);
      --text:#e5e7eb;
      --muted: rgba(226,232,240,0.7);

      --aqua:#22d3ee;
      --violet:#a78bfa;
      --blue:#60a5fa;

      --userGrad: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(37,99,235,0.95));
      --aiBg: rgba(31,41,55,0.92);

      --shadow: 0 26px 90px rgba(0,0,0,0.55);
      --shadow2: 0 14px 40px rgba(0,0,0,0.35);

      --radius: 22px;
      --radius2: 16px;
    }

    /* Light theme */
    body.light{
      --bg0:#f8fafc;
      --bg1:#e5e7eb;
      --panel: rgba(255,255,255,0.72);
      --panel2: rgba(255,255,255,0.55);
      --border: rgba(15,23,42,0.12);
      --text:#0f172a;
      --muted: rgba(15,23,42,0.62);

      --aiBg: rgba(255,255,255,0.95);
      --shadow: 0 22px 70px rgba(15,23,42,0.12);
      --shadow2: 0 10px 28px rgba(15,23,42,0.10);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      overflow:hidden;
      background: radial-gradient(1200px 700px at 18% 20%, rgba(34,211,238,0.14), transparent 55%),
                  radial-gradient(1000px 650px at 85% 35%, rgba(167,139,250,0.13), transparent 55%),
                  linear-gradient(135deg, var(--bg0), var(--bg1));
    }

    /* Calm cyber layers (SLOW) */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        linear-gradient(transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%),
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.025),
          rgba(255,255,255,0.025) 1px,
          transparent 2px,
          transparent 6px
        );
      opacity:0.45;
      animation: drift 22s linear infinite; /* ✅ 慢很多 */
      transform: translateZ(0);
    }

    body::after{
      content:"";
      position:fixed;
      inset:-20%;
      pointer-events:none;
      z-index:0;
      background:
        radial-gradient(circle at 20% 25%, rgba(34,211,238,0.08), transparent 40%),
        radial-gradient(circle at 80% 35%, rgba(167,139,250,0.08), transparent 42%),
        radial-gradient(circle at 50% 80%, rgba(96,165,250,0.06), transparent 45%);
      filter: blur(18px);
      animation: breathe 16s ease-in-out infinite; /* ✅ 很柔 */
      transform: translateZ(0);
      opacity: 0.7;
    }

    @keyframes drift{
      0%{ background-position-y: -60%; }
      100%{ background-position-y: 60%; }
    }
    @keyframes breathe{
      0%{ transform: translate3d(0,0,0) scale(1); opacity:0.62; }
      50%{ transform: translate3d(0,-8px,0) scale(1.02); opacity:0.75; }
      100%{ transform: translate3d(0,0,0) scale(1); opacity:0.62; }
    }

    .wrapper{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      z-index:1;
    }

    /* Sidebar */
    .sidebar{
      width: 290px;
      position:absolute;
      left:-290px;
      top:0; bottom:0;
      z-index:20;

      background: linear-gradient(180deg, rgba(2,6,23,0.72), rgba(2,6,23,0.55));
      border-right: 1px solid var(--border);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow2);

      display:flex;
      flex-direction:column;
      transition: left .32s ease;
    }
    body.light .sidebar{
      background: linear-gradient(180deg, rgba(255,255,255,0.82), rgba(255,255,255,0.62));
    }
    .sidebar.show{ left:0; }

    .sidebar-header{
      padding: 14px 14px 12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom: 1px solid var(--border);
      gap:10px;
    }
    .sidebar-title{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .sidebar-title .t1{
      font-weight: 700;
      letter-spacing: 0.3px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .pill{
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: rgba(255,255,255,0.04);
      width: fit-content;
    }
    body.light .pill{ background: rgba(15,23,42,0.03); }

    .sidebar-clear{
      cursor:pointer;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      user-select:none;
      transition: transform .12s ease, border-color .12s ease;
    }
    .sidebar-clear:hover{
      transform: translateY(-1px);
      border-color: rgba(34,211,238,0.35);
    }

    .sidebar-body{
      flex:1;
      overflow-y:auto;
      padding: 12px 12px 16px;
    }

    .sidebar-item{
      padding: 10px 10px;
      border-radius: 14px;
      margin-bottom: 8px;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.28);
      color: var(--text);
      font-size: 12.5px;
      line-height: 1.35;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      cursor: default;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }
    body.light .sidebar-item{ background: rgba(15,23,42,0.04); }
    .sidebar-item:hover{
      transform: translateY(-1px);
      border-color: rgba(167,139,250,0.35);
      background: rgba(15,23,42,0.34);
    }
    body.light .sidebar-item:hover{ background: rgba(15,23,42,0.06); }

    /* Main App */
    .app{
      flex:1;
      margin: 16px;
      border-radius: var(--radius);
      overflow:hidden;
      background: linear-gradient(180deg, rgba(15,23,42,0.76), rgba(15,23,42,0.56));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
      display:flex;
      flex-direction:column;
      transition: margin-left .32s ease;
      position:relative;
    }
    body.light .app{
      background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(255,255,255,0.56));
    }
    .app.shift{ margin-left: 306px; }

    /* Subtle neon frame */
    .app::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      border-radius: var(--radius);
      padding: 1px;
      background: linear-gradient(135deg,
        rgba(34,211,238,0.35),
        rgba(167,139,250,0.22),
        rgba(96,165,250,0.22)
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      opacity: 0.8;
    }

    /* Header (AI Lab Mode) */
    .header{
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .brand{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width: 0;
    }
    .brand .title{
      font-weight: 800;
      letter-spacing: 0.3px;
      display:flex;
      align-items:center;
      gap:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .dot{
      width: 8px; height:8px;
      border-radius:999px;
      background: rgba(34,211,238,0.9);
      box-shadow: 0 0 0 3px rgba(34,211,238,0.12), 0 0 18px rgba(34,211,238,0.45);
      flex: 0 0 auto;
    }
    .brand .sub{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(255,255,255,0.03);
    }
    body.light .badge{ background: rgba(15,23,42,0.03); }

    .header-right{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .toggle{
      cursor:pointer;
      user-select:none;
      width: 38px;
      height: 38px;
      display:grid;
      place-items:center;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(255,255,255,0.03);
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      font-size: 18px;
    }
    body.light .toggle{ background: rgba(15,23,42,0.03); }
    .toggle:hover{
      transform: translateY(-1px);
      border-color: rgba(34,211,238,0.35);
      box-shadow: 0 0 0 4px rgba(34,211,238,0.08);
    }
    .toggle.voice-on{
      border-color: rgba(34,211,238,0.45);
      box-shadow: 0 0 0 4px rgba(34,211,238,0.12), 0 0 18px rgba(34,211,238,0.16);
    }

    /* Chat area */
    .chat{
      flex:1;
      padding: 18px 18px 8px;
      overflow-y:auto;
      -webkit-overflow-scrolling: touch;
      position:relative;
    }

    .message{
      display:flex;
      margin-bottom: 12px;
      animation: pop .18s ease;
    }
    @keyframes pop{
      from{ opacity:0; transform: translateY(4px); }
      to{ opacity:1; transform:none; }
    }

    .user{ justify-content:flex-end; }
    .assistant{ justify-content:flex-start; }

    .bubble{
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.65;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
      position:relative;
      border: 1px solid rgba(148,163,184,0.18);
      background: rgba(15,23,42,0.35);
    }

    .user .bubble{
      background: var(--userGrad);
      color: #fff;
      border-bottom-right-radius: 8px;
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 14px 36px rgba(37,99,235,0.18);
    }

    .assistant .bubble{
      background: var(--aiBg);
      color: var(--text);
      border-bottom-left-radius: 8px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    }

    .bubble .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      opacity: 0.85;
    }
    .tag .miniDot{
      width:6px;height:6px;border-radius:999px;
      background: rgba(167,139,250,0.9);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.10);
    }

    .thinking{
      opacity: 0.78;
      font-style: italic;
      border-color: rgba(34,211,238,0.22) !important;
      box-shadow: 0 0 0 4px rgba(34,211,238,0.07);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink{
      0%,100%{ opacity:0.55; }
      50%{ opacity:0.95; }
    }

    .thumb{
      margin-top: 8px;
      border-radius: 14px;
      max-width: 180px;
      display:block;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }
    .meta{
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    /* Footer */
    .footer{
      padding: 12px 14px 14px;
      border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
    }
    body.light .footer{
      background: linear-gradient(180deg, rgba(15,23,42,0.02), rgba(15,23,42,0.00));
    }

    .input-row{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .file-label{
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display:grid;
      place-items:center;
      cursor:pointer;
      border: 1px solid rgba(148,163,184,0.22);
      background: rgba(255,255,255,0.03);
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
      user-select:none;
    }
    body.light .file-label{ background: rgba(15,23,42,0.03); }
    .file-label:hover{
      transform: translateY(-1px);
      border-color: rgba(167,139,250,0.35);
      box-shadow: 0 0 0 4px rgba(167,139,250,0.08);
    }
    input[type="file"]{ display:none; }

    textarea{
      flex:1;
      resize:none;
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(148,163,184,0.22);
      outline:none;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: rgba(2,6,23,0.30);
      backdrop-filter: blur(12px);
      transition: border-color .12s ease, box-shadow .12s ease;
    }
    body.light textarea{
      background: rgba(255,255,255,0.72);
    }
    textarea.listening {
      border-color: rgba(34,211,238,0.55);
      box-shadow: 0 0 0 4px rgba(34,211,238,0.15);
   }
    textarea:focus{
      border-color: rgba(34,211,238,0.40);
      box-shadow: 0 0 0 4px rgba(34,211,238,0.10);
    }

    .controls{
      display:flex;
      gap:10px;
      margin-top: 10px;
    }

    button{
      flex:1;
      padding: 12px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.18);
      color: #fff;
      font-weight: 800;
      letter-spacing: .3px;
      cursor:pointer;
      background: linear-gradient(135deg, rgba(59,130,246,0.95), rgba(37,99,235,0.95));
      box-shadow: 0 14px 34px rgba(37,99,235,0.22);
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
    }
    button:hover{
      transform: translateY(-1px);
      box-shadow: 0 16px 40px rgba(37,99,235,0.28);
    }
    button:disabled{
      opacity: 0.55;
      cursor:not-allowed;
      transform:none;
      box-shadow:none;
    }

    /* Mobile */
    @media (max-width: 768px){
      .app{ margin: 10px; border-radius: 18px; }
      .app.shift{ margin-left: 10px; } /* sidebar 覆蓋 */
      .sidebar{
        width: 86%;
        left: -86%;
      }
      .sidebar.show{ left:0; }
    }
  </style>
</head>

<body>
<div class="wrapper">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <div class="t1">Session Log <span class="pill">localStorage</span></div>
        <div class="pill">AI Lab Mode · Calm Cyber</div>
      </div>
      <div id="clearHistory" class="sidebar-clear" title="清除聊天記錄">清除</div>
    </div>
    <div id="historyList" class="sidebar-body"></div>
  </aside>

  <main id="app" class="app">
    <header class="header">
      <div class="brand">
        <div class="title"><span class="dot"></span> AI Assistant · Lab</div>
        <div class="sub">
          <span class="badge">MODEL: Gemini 2.5 Flash</span>
          <span class="badge">STATUS: Online</span>
        </div>
      </div>

      <div class="header-right">
        <div id="historyBtn" class="toggle" title="Session Log">☰</div>
        <div id="themeBtn" class="toggle" title="深色 / 亮色">🌓</div>
        <div id="voiceBtn" class="toggle" title="語音朗讀（預設關閉）">🔇</div>
      </div>
    </header>

    <section id="chat" class="chat"></section>

    <footer class="footer">
      <div class="input-row">
        <label class="file-label" title="上傳圖片 / PDF">
          📎
          <input
            type="file"
            id="fileInput"
            accept="image/*,.pdf,application/pdf,.csv"
            multiple
          />
        </label>
        <textarea id="input" rows="2" placeholder="輸入文字或用語音…（支援圖片/PDF/CSV）"></textarea>
      </div>
      <div class="controls">
        <button id="mic" type="button">🎤 語音輸入</button>
        <button id="send" type="button">送出</button>
      </div>
    </footer>
  </main>
</div>

<script>
  // 👉 API 網址保留你的設定
  const API_BASE_URL = "https://schedule-bot-uzuu.onrender.com";
  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("input");
  const fileInput = document.getElementById("fileInput");
  const defaultPlaceholder = inputEl.placeholder;
  const sendBtn = document.getElementById("send");
  const micBtn = document.getElementById("mic");

  const themeBtn = document.getElementById("themeBtn");
  const voiceBtn = document.getElementById("voiceBtn");
  const historyBtn = document.getElementById("historyBtn");

  const sidebar = document.getElementById("sidebar");
  const appEl = document.getElementById("app");
  const historyList = document.getElementById("historyList");
  const clearHistoryBtn = document.getElementById("clearHistory");

  let pendingVoiceAction = null;

/* =========================
   File input UX（選檔提示）
========================= */
fileInput.onchange = () => {
  if (fileInput.files.length > 0) {
    inputEl.placeholder = `📎 已選 ${fileInput.files.length} 個檔案，可直接輸入問題`;
  } else {
    inputEl.placeholder = defaultPlaceholder;
  }
};

  /* =========================
     Theme (保留功能)
  ========================= */
  if (localStorage.getItem("theme") === "light") {
    document.body.classList.add("light");
  }
  themeBtn.onclick = () => {
    document.body.classList.toggle("light");
    localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
  };

  /* =========================
     Sidebar (保留功能)
  ========================= */
  historyBtn.onclick = () => {
    sidebar.classList.toggle("show");
    appEl.classList.toggle("shift");
  };

  clearHistoryBtn.onclick = () => {
    if (!confirm("確定要清除所有聊天記錄嗎？")) return;
    localStorage.removeItem("chat_history");
    historyList.innerHTML = "";
    chatEl.innerHTML = "";
  };

  /* =========================
     Voice TTS
  ========================= */
  let voiceEnabled = JSON.parse(localStorage.getItem("voice_enabled") || "false");
  function syncVoiceUI(){
    voiceBtn.textContent = voiceEnabled ? "🔈" : "🔇";
    voiceBtn.classList.toggle("voice-on", voiceEnabled);
    voiceBtn.title = voiceEnabled ? "語音朗讀：開" : "語音朗讀：關（預設）";
  }
  syncVoiceUI();

  voiceBtn.onclick = () => {
    voiceEnabled = !voiceEnabled;
    localStorage.setItem("voice_enabled", JSON.stringify(voiceEnabled));
    if (!voiceEnabled && window.speechSynthesis) {
      window.speechSynthesis.cancel();
    }
    syncVoiceUI();
  };

  /* =========================
    Speech Recognition (語音輸入)
========================= */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const recog = SR ? new SR() : null;

if (!navigator.mediaDevices || !recog) {
  micBtn.disabled = true;
  micBtn.textContent = "🎤 不支援語音";
}
  
let isListening = false;
let lastTranscript = "";

function resetMicUI() {
  isListening = false;
  lastTranscript = "";
  micBtn.textContent = "🎤 語音輸入";
  micBtn.classList.remove("voice-on");
  sendBtn.disabled = false;
  inputEl.placeholder = defaultPlaceholder;
  inputEl.classList.remove("listening");
  if (pendingVoiceAction) return;
}

if (recog) {
  recog.lang = "zh-TW";
  recog.interimResults = false;
  recog.maxAlternatives = 1;

  recog.onstart = () => console.log("🎤 recognition STARTED");
  
  micBtn.onclick = () => {
    if (pendingVoiceAction) {
      renderMessage("assistant", "請直接說「對」或「取消」");
      return;
    }
    if (!isListening) {
      try {
        recog.start();
        isListening = true;
        micBtn.textContent = "🛑 停止語音";
        micBtn.classList.add("voice-on");
        sendBtn.disabled = true;
        inputEl.placeholder = "🎙 Listening…";
        inputEl.classList.add("listening");
      } catch (e) {
        console.warn("Speech start error", e);
      }
    } else {
      recog.stop();
    }
  };

  recog.onresult = e => {
    const text = e.results[0][0].transcript.trim();
    if (!text) return;
    smartSend(text); 
  };

  recog.onerror = e => {
    console.warn("Speech error:", e.error);
    if (e.error === "not-allowed" || e.error === "service-not-allowed") {
      alert("請允許麥克風權限後再使用語音輸入");
    } else {
      alert("語音辨識失敗，請再試一次");
    }
    resetMicUI();
  };

  recog.onend = () => {
    console.log("🎤 recognition ENDED");
    if (pendingVoiceAction) return;
  };
}

// =========================
// ✅ 核心：處理串流輸出 (打字機效果 + 攔截寄信動作)
// =========================
async function handleStreamResponse(res, thinkingBubble) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder("utf-8");
  
  // 移除「思考中」的泡泡
  thinkingBubble.parentElement.remove();

  // 建立一個新的 AI 回覆泡泡
  const bubble = renderMessage("assistant", "", { tag: "AI · Stream Output" });
  
  // 抓取剛剛在 renderMessage 中產生的文字容器 class="text-content"
  const textDiv = bubble.querySelector(".text-content");
  let fullReply = "";

  // 開始接收水流 (Chunks)
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    // 解碼並累加文字
    const chunk = decoder.decode(value, { stream: true });
    fullReply += chunk;
    textDiv.textContent = fullReply;
    
    // 自動捲動到底部
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  if (voiceEnabled) speak(fullReply);
  saveHistory({ role: "assistant", text: fullReply });

  // 檢查是否觸發了「寄信功能 (Function Calling)」
  if (fullReply.includes("📧 【系統動作：準備寄信】")) {
    const recMatch = fullReply.match(/收件人：(.*)/);
    const bodyMatch = fullReply.match(/內容：([\s\S]*?)\n\n請問/);
    
    const toName = recMatch ? recMatch[1].trim() : "主管";
    const bodyText = bodyMatch ? bodyMatch[1].trim() : fullReply;

    renderMailAction({
      to: "boss@example.com", 
      subject: `來自 AI 助理的信件 (To: ${toName})`,
      body: bodyText
    });
  }
}

// =========================
// ✅ 語音送出
// =========================
async function smartSend(text) {
  renderMessage("user", text);
  saveHistory({ role: "user", text });

  const thinkingBubble = renderMessage("assistant", "… 正在思考中", { thinking: true });

  try {
    const form = new FormData();
    form.append("message", text);
    form.append("user_id", "guest_voice"); 

    const res = await fetch(`${API_BASE_URL}/chat`, {
      method: "POST",
      body: form
    });

    if (!res.ok) throw new Error(await res.text());

    await handleStreamResponse(res, thinkingBubble);

  } catch (e) {
    thinkingBubble.querySelector(".text-content").textContent = "❌ 語音處理失敗";
    console.error(e);
  } finally {
    resetMicUI();
  }
}

// =========================
// ✅ 文字與檔案送出 (支援多檔圖片 / PDF / CSV)
// =========================
sendBtn.onclick = async () => {
  const text = inputEl.value.trim();
  const files = Array.from(fileInput.files);

  if (!text && files.length === 0) return;

  const userLabel = text || `🗂 已上傳 ${files.length} 個檔案`;
  renderMessage("user", userLabel);
  saveHistory({ role: "user", text: text || `[上傳 ${files.length} 個檔案]` });

  let thinkingBubble = renderMessage(
    "assistant",
    files.length > 0 ? `📂 正在分析檔案，請稍候…` : "… 正在思考中",
    { thinking: true }
  );

  try {
    const form = new FormData();
    form.append("message", text);
    form.append("user_id", "guest_web");

    for (const file of files) {
      form.append("image", file);
    }

    const res = await fetch(`${API_BASE_URL}/chat`, {
      method: "POST",
      body: form,
    });

    if (!res.ok) throw new Error(await res.text());

    await handleStreamResponse(res, thinkingBubble);

  } catch (e) {
    thinkingBubble.querySelector(".text-content").textContent = "❌ 連線失敗，請稍後再試";
    console.error(e);
  } finally {
    inputEl.value = "";
    fileInput.value = "";
    fileInput.onchange(); 
  }
};

  /* =========================
     Load history (保留功能)
  ========================= */
  const historyData = JSON.parse(localStorage.getItem("chat_history") || "[]");
  historyData.forEach(m => {
    renderMessage(m.role, m.text);
    addHistoryLine(m);
  });

  /* =========================
     Render (UI 繪製更新)
  ========================= */
  function renderMessage(role, text, options = {}) {
    const { imageUrl = null, thinking = false, tag = null } = options;

    const row = document.createElement("div");
    row.className = `message ${role}`;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    if (thinking) bubble.classList.add("thinking");

    if (tag) {
      const t = document.createElement("div");
      t.className = "tag";
      t.innerHTML = `<span class="miniDot"></span> ${tag}`;
      bubble.appendChild(t);
    }

    const textNode = document.createElement("div");
    textNode.className = "text-content"; // 👈 新增這個 class 讓上面的 JS 抓得到
    textNode.textContent = text;
    bubble.appendChild(textNode);

    if (imageUrl) {
      const img = document.createElement("img");
      img.src = imageUrl;
      img.className = "thumb";
      bubble.appendChild(img);
    }

    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return bubble;
  }

  // =========================
  // 📧 顯示「用 Outlook 寄出」按鈕
  // =========================
  function renderMailAction({ to, subject, body }) {
    const row = document.createElement("div");
    row.className = "message assistant";
  
    const bubble = document.createElement("div");
    bubble.className = "bubble";
  
    const textDiv = document.createElement("div");
    textDiv.textContent = "📧 我已幫你整理好請假信，要用 Outlook 寄出嗎？";
  
    const btn = document.createElement("button");
    btn.style.marginTop = "10px";
    btn.textContent = "📧 用 Outlook 寄出";
    btn.onclick = () => {
      openOutlookMail({ to, subject, body });
    };
  
    bubble.appendChild(textDiv);
    bubble.appendChild(btn);
    row.appendChild(bubble);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  /* =========================
     Sidebar history
  ========================= */
  function addHistoryLine({ role, text }) {
    const div = document.createElement("div");
    div.className = "sidebar-item";
    const prefix = role === "user" ? "USER" : "AI";
    div.textContent = `${prefix} · ${text}`;
    historyList.appendChild(div);
  }

  function saveHistory(entry) {
    const list = JSON.parse(localStorage.getItem("chat_history") || "[]");
    list.push(entry);
    localStorage.setItem("chat_history", JSON.stringify(list));
    addHistoryLine(entry);
  }

  /* =========================
     TTS
  ========================= */
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel(); 
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-TW";
    window.speechSynthesis.speak(u);
  }

// =========================
// 📧 開啟 Outlook 寄信
// =========================
function openOutlookMail({ to, subject, body }) {
  const url =
    "https://outlook.office.com/mail/deeplink/compose" +
    `?to=${encodeURIComponent(to)}` +
    `&subject=${encodeURIComponent(subject)}` +
    `&body=${encodeURIComponent(body)}`;

  window.open(url, "_blank");
}

  function renderConfirmUI(text) {
  const row = document.createElement("div");
  row.className = "message assistant";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const textDiv = document.createElement("div");
  textDiv.textContent = text;
  bubble.appendChild(textDiv);

  const btns = document.createElement("div");
  btns.style.marginTop = "10px";
  btns.style.display = "flex";
  btns.style.gap = "8px";

  const ok = document.createElement("button");
  ok.textContent = "✅ 確認";
  ok.onclick = confirmVoiceAction;

  const cancel = document.createElement("button");
  cancel.textContent = "❌ 取消";
  cancel.onclick = () => {
    pendingVoiceAction = null;
    renderMessage("assistant", "好，已取消 👍");
  };

  btns.appendChild(ok);
  btns.appendChild(cancel);
  bubble.appendChild(btns);

  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function confirmVoiceAction() {
  if (!pendingVoiceAction) return;

  try {
    const res = await fetch(`${API_BASE_URL}/voice-confirm`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(pendingVoiceAction)
    });
    const data = await res.json();
    renderMessage("assistant", data.reply);
  } catch (e) {
    renderMessage("assistant", "❌ 執行失敗");
  } finally {
    pendingVoiceAction = null;
  }
}
</script>
